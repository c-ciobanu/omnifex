name: omnifex-server

services:
  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"
    volumes:
      - omnifex-valkey-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml
      - omnifex-garage-meta:/var/lib/garage/meta
      - omnifex-garage-data:/var/lib/garage/data
    healthcheck:
      test: [ "CMD-SHELL", "garage status" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  omnifex-valkey-data:
  omnifex-garage-meta:
  omnifex-garage-data:
