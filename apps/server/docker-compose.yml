name: omnifex-server

services:
  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"
    volumes:
      - omnifex-valkey-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  versitygw:
    image: versity/versitygw:v1.3.1
    command: posix /data
    ports:
      - "7070:7070"
    environment:
      - ROOT_ACCESS_KEY_ID=versitygw
      - ROOT_SECRET_ACCESS_KEY=versitygw_secret
      - VGW_REGION=us-east-1
      - VGW_HEALTH=/health
      - VGW_CORS_ALLOW_ORIGIN=http://localhost:3100
    volumes:
      - omnifex-s3-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://127.0.0.1:7070/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  omnifex-valkey-data:
  omnifex-s3-data:
